backend:
  build: .
  ports:
    - "8000:8000"
  volumes:
    - .:/app
    - ./data:/app/data
  environment:
    - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
    - AWS_REGION=${AWS_REGION}
    - S3_BUCKET_NAME=${S3_BUCKET_NAME}
    - S3_REGION=${S3_REGION}
    - OPENAI_API_KEY=${OPENAI_API_KEY}
    - CORS_ORIGINS=${CORS_ORIGINS}
  restart: unless-stopped